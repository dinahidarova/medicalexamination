<?php
session_start();

// Если пользователь уже авторизован как пациент
if(isset($_SESSION['user_id']) && isset($_SESSION['role']) && $_SESSION['role'] === 'patient') {
    header("Location: hms/patient/index.php");
    exit();
}

// Если авторизован как другой пользователь (админ, врач и т.д.)
if(isset($_SESSION['user_id']) && isset($_SESSION['role'])) {
    switch($_SESSION['role']) {
        case 'admin':
            header("Location: hms/admin/index.php");
            break;
        case 'doctor':
            header("Location: hms/doctor/index.php");
            break;
        case 'employee':
            header("Location: hms/employee/index.php");
            break;
        case 'laboratorist':
            header("Location: hms/laboratorist/index.php");
            break;
        case 'receptionist':
            header("Location: hms/receptionist/index.php");
            break;
        default:
            header("Location: hms/patient/index.php");
    }
    exit();
}

    <script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
    }
    
    // Предотвращаем вход для других ролей через консоль
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && e.key === 'A') {
            e.preventDefault();
            alert('Доступ только для пациентов. Сотрудники используют специальные ссылки.');
        }
    });
    </script>
